<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoViz Playground</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c12; --surface: #12141d; --surface2: #1a1d2b; --surface3: #242838;
  --border: #2a3050; --border-active: #4f6fff; --border-subtle: #1e2236;
  --text: #edf0ff; --text-muted: #8892b0; --text-dim: #5a6380;
  --accent: #6c8cff; --accent-bright: #8facff; --accent-glow: rgba(108,140,255,0.3);
  --accent-subtle: rgba(108,140,255,0.08);
  --success: #34d399; --success-glow: rgba(52,211,153,0.25);
  --warning: #fbbf24; --warning-glow: rgba(251,191,36,0.2);
  --danger: #f87171; --danger-glow: rgba(248,113,113,0.2);
  --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
}

@font-face {
  font-family: 'Inter';
  src: local('Inter'), local('Inter-Regular');
}

body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ================================================================
   HEADER
   ================================================================ */
.pg-header {
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border-subtle);
  padding: 28px 40px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.pg-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 0%, var(--accent-glow), transparent);
  pointer-events: none;
}
.pg-header h1 {
  font-size: 32px; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; position: relative; margin-bottom: 6px;
}
.pg-header .tagline {
  font-size: 15px; color: var(--text-muted); font-weight: 400;
  position: relative; letter-spacing: 0.01em;
}
.pg-header .tagline strong {
  color: var(--accent-bright); font-weight: 600;
}

/* ================================================================
   LAYOUT
   ================================================================ */
.pg-container {
  max-width: 1280px; margin: 0 auto; padding: 24px 32px 48px;
  display: grid; grid-template-columns: 300px 1fr; gap: 24px;
  min-height: calc(100vh - 110px);
}

/* ================================================================
   SIDEBAR — Algorithm Selector + Info
   ================================================================ */
.pg-sidebar {
  display: flex; flex-direction: column; gap: 16px;
}
.pg-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow-md);
}
.pg-panel-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 14px;
}

/* Algorithm list */
.pg-algo-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.pg-algo-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius);
  cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  font-size: 14px; font-weight: 500; color: var(--text-muted);
}
.pg-algo-item:hover {
  background: var(--surface2); color: var(--text);
  border-color: var(--border);
}
.pg-algo-item.active {
  background: var(--accent-subtle); color: var(--accent-bright);
  border-color: rgba(108,140,255,0.25);
}
.pg-algo-item .algo-icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: var(--surface2);
}
.pg-algo-item.active .algo-icon {
  background: rgba(108,140,255,0.15);
}
.pg-algo-item .algo-name { flex: 1; }
.pg-algo-item .algo-diff {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px;
  background: var(--surface3); color: var(--text-dim);
}
.pg-algo-item .algo-diff.beginner { color: var(--success); background: var(--success-glow); }
.pg-algo-item .algo-diff.intermediate { color: var(--warning); background: var(--warning-glow); }
.pg-algo-item .algo-diff.advanced { color: var(--danger); background: var(--danger-glow); }

/* Info panel */
.pg-info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.pg-info-item {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.pg-info-item .info-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 4px;
}
.pg-info-item .info-value {
  font-size: 13px; font-weight: 600; color: var(--text);
  font-family: var(--mono);
}
.pg-info-item.full { grid-column: 1 / -1; }
.pg-info-item .info-value.desc {
  font-family: var(--font); font-weight: 400; font-size: 13px;
  line-height: 1.5; color: var(--text-muted);
}
.pg-tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.pg-tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; background: var(--surface3); color: var(--text-dim);
  font-family: var(--mono); letter-spacing: 0.02em;
}

/* Custom JSON panel */
.pg-json-panel textarea {
  width: 100%; height: 140px; resize: vertical;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  font-family: var(--mono); font-size: 12px; line-height: 1.5;
  color: var(--text); outline: none; transition: border-color 0.2s;
}
.pg-json-panel textarea:focus {
  border-color: var(--accent);
}
.pg-json-panel textarea::placeholder {
  color: var(--text-dim);
}
.pg-json-btn {
  margin-top: 10px; width: 100%; padding: 10px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 700;
  font-family: var(--font); cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.02em;
}
.pg-json-btn:hover { background: var(--accent-bright); transform: translateY(-1px); }
.pg-json-btn:active { transform: translateY(0); }
.pg-json-error {
  margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-sm);
  background: var(--danger-glow); color: var(--danger);
  font-size: 12px; font-family: var(--mono); display: none;
  line-height: 1.4; word-break: break-word;
}

/* ================================================================
   MAIN PLAYER AREA
   ================================================================ */
.pg-player-wrap {
  display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow-lg);
  min-height: 0;
}

/* Player internal header */
.av-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.av-header h1 {
  font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent-bright) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.av-meta { display: flex; gap: 8px; }
.av-badge {
  background: var(--surface2); padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  border: 1px solid var(--border); letter-spacing: 0.02em;
  font-family: var(--mono);
}
.av-badge-accent { color: var(--accent); border-color: rgba(108,140,255,0.3); background: rgba(108,140,255,0.08); }

/* Canvas */
.av-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.av-canvas-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; min-height: 360px; position: relative;
}
.av-canvas-wrap svg {
  width: 100%; height: 100%; max-width: 100%; max-height: 100%;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.15));
}

/* SVG Transitions */
.av-actor { transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.av-transition-instant .av-actor { transition: none !important; }
.av-transition-swap .av-actor {
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes av-pulse {
  0%, 100% { filter: drop-shadow(0 0 0px transparent); }
  50% { filter: drop-shadow(0 0 12px var(--accent-glow)); }
}
@keyframes av-glow-success {
  0%, 100% { filter: drop-shadow(0 0 0px transparent); }
  50% { filter: drop-shadow(0 0 8px var(--success-glow)); }
}

.av-actor-active { animation: av-pulse 1.2s ease-in-out infinite; }
.av-actor-done { animation: av-glow-success 2s ease-in-out 1; }

/* Description Panel */
.av-description {
  padding: 14px 20px; background: var(--surface);
  border-top: 1px solid var(--border); min-height: 52px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.av-description-step {
  font-size: 12px; color: var(--accent); font-weight: 700;
  white-space: nowrap; font-family: var(--mono);
  background: rgba(108,140,255,0.1); padding: 3px 8px;
  border-radius: var(--radius-sm); min-width: 56px; text-align: center;
}
.av-description-text {
  font-size: 15px; line-height: 1.5; font-weight: 500;
  color: var(--text);
}
.av-description-text:empty::after {
  content: 'Press play or use arrow keys to start';
  color: var(--text-dim); font-style: italic; font-weight: 400;
}
.av-description-text .highlight { color: var(--accent); font-weight: 600; }
.av-description-text .warn { color: var(--warning); font-weight: 600; }
.av-description-text .success { color: var(--success); font-weight: 600; }
.av-description-text .danger { color: var(--danger); font-weight: 600; }

.av-annotation-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
  white-space: nowrap; font-family: var(--mono);
}
.av-annotation-badge[data-type="invariant"] { background: var(--success-glow); color: var(--success); }
.av-annotation-badge[data-type="warning"] { background: var(--warning-glow); color: var(--warning); }
.av-annotation-badge[data-type="boundary"] { background: var(--danger-glow); color: var(--danger); }
.av-annotation-badge[data-type="decision"] { background: var(--accent-glow); color: var(--accent); }
.av-annotation-badge[data-type="initialization"] { background: var(--surface2); color: var(--text-muted); }
.av-annotation-badge[data-type="explanation"] { background: var(--accent-glow); color: var(--accent-bright); }
.av-phase-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
  white-space: nowrap; font-family: var(--mono);
  background: var(--surface3); color: var(--text-dim);
}

/* Controls */
.av-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 20px; background: var(--surface2);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.av-btn {
  background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted);
  width: 36px; height: 36px; border-radius: var(--radius);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.2s; flex-shrink: 0;
}
.av-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-active); }
.av-btn:active { transform: scale(0.95); }
.av-btn.av-btn-play {
  width: 44px; height: 44px; background: var(--accent); border-color: var(--accent);
  border-radius: 50%; font-size: 16px; color: white;
  box-shadow: 0 0 20px var(--accent-glow);
  transition: all 0.2s;
}
.av-btn.av-btn-play:hover { background: var(--accent-bright); box-shadow: 0 0 30px var(--accent-glow); transform: scale(1.05); }
.av-btn.av-btn-play:active { transform: scale(0.95); }

.av-timeline {
  flex: 1; height: 6px; -webkit-appearance: none; appearance: none;
  background: var(--surface3); border-radius: 3px; outline: none; cursor: pointer;
}
.av-timeline::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--accent); border-radius: 50%; cursor: grab;
  box-shadow: 0 0 8px var(--accent-glow); transition: transform 0.15s;
}
.av-timeline::-webkit-slider-thumb:hover { transform: scale(1.2); }
.av-timeline::-moz-range-thumb {
  width: 16px; height: 16px; background: var(--accent);
  border-radius: 50%; border: none; cursor: grab;
}

.av-speed {
  background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted);
  padding: 4px 8px; border-radius: var(--radius-sm); font-size: 12px;
  font-family: var(--mono); font-weight: 600;
  cursor: pointer; min-width: 48px; text-align: center;
  transition: all 0.2s;
}
.av-speed:hover { border-color: var(--border-active); color: var(--text); }

.av-step-count {
  font-size: 12px; color: var(--text-dim); white-space: nowrap;
  min-width: 55px; text-align: right; font-family: var(--mono);
  font-weight: 500;
}

/* Legend */
.av-legend {
  display: flex; gap: 16px; padding: 8px 20px;
  background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0; justify-content: center;
}
.av-legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-dim); font-weight: 500;
}
.av-legend-dot {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  box-shadow: 0 0 4px rgba(0,0,0,0.2);
}

/* ================================================================
   KEYBOARD SHORTCUTS HINT
   ================================================================ */
.pg-shortcuts {
  display: flex; justify-content: center; gap: 20px;
  padding: 8px 20px; flex-shrink: 0;
  border-top: 1px solid var(--border-subtle);
  background: var(--surface);
}
.pg-shortcut {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-dim);
}
.pg-key {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: 10px;
  font-family: var(--mono); font-weight: 700; color: var(--text-muted);
  min-width: 22px; text-align: center;
}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 900px) {
  .pg-container {
    grid-template-columns: 1fr; padding: 16px;
  }
  .pg-header { padding: 20px 16px; }
  .pg-header h1 { font-size: 24px; }
  .av-canvas-wrap { min-height: 280px; }
}

/* ================================================================
   SCROLLBAR STYLING
   ================================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* ================================================================
   LOADING FADE-IN
   ================================================================ */
@keyframes pg-fadein {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.pg-container { animation: pg-fadein 0.4s ease-out; }
</style>
</head>

<!-- ================================================================
     HEADER

<header class="pg-header">
  <h1>AlgoViz Playground</h1>
  <p class="tagline">Interactive algorithm visualizations -- <strong>no install required</strong></p>
</header>

<!-- ================================================================
     MAIN LAYOUT
     ================================================================ -->
<div class="pg-container">

  <!-- SIDEBAR -->
  <aside class="pg-sidebar">

    <!-- Algorithm Selector -->
    <div class="pg-panel">
      <div class="pg-panel-title">Algorithms</div>
      <ul class="pg-algo-list" id="algo-list"></ul>
    </div>

    <!-- Info Panel -->
    <div class="pg-panel" id="info-panel">
      <div class="pg-panel-title">Details</div>
      <div class="pg-info-grid" id="info-grid">
        <div class="pg-info-item full">
          <div class="info-label">Select an algorithm</div>
          <div class="info-value desc">Choose from the list above to see algorithm details and visualization.</div>
        </div>
      </div>
    </div>

    <!-- Custom JSON -->
    <div class="pg-panel pg-json-panel">
      <div class="pg-panel-title">Paste Custom JSON</div>
      <textarea id="json-input" placeholder='Paste AlgoViz JSON here...&#10;&#10;{&#10;  "version": "1.0",&#10;  "metadata": { ... },&#10;  "actors": [ ... ],&#10;  "steps": [ ... ]&#10;}'></textarea>
      <button class="pg-json-btn" id="load-json-btn">Load JSON</button>
      <div class="pg-json-error" id="json-error"></div>
    </div>

  </aside>

  <!-- PLAYER -->
  <main class="pg-player-wrap" id="player-root">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:500px;flex-direction:column;gap:12px;color:var(--text-dim);">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      <span style="font-size:15px;font-weight:500;">Select an algorithm to begin</span>
    </div>
  </main>

</div>

// ---- State Engine ----

class Engine {
  constructor(v) {
    this.viz = v;
    this.config = this._mc(v.config || {});
    this.totalSteps = v.steps.length;
    this.currentStep = -1;
    this.actorStates = new Map();
    this._init();
  }

  _mc(c) {
    return {
      canvas: { ...D.canvas, ...(c.canvas || {}) },
      theme: { ...D.theme, ...(c.theme || {}) },
      playback: { ...D.playback, ...(c.playback || {}) }
    };
  }

  _init() {
    this.actorStates.clear();
    for (const a of this.viz.actors) this.actorStates.set(a.id, { ...a });
    this.currentStep = -1;
  }

  resolveColor(c) {
    if (!c) return null;
    if (typeof c === "string" && c.startsWith("$"))
      return this.config.theme[c.slice(1)] || c;
    return c;
  }

  _apply(actions) {
    for (const a of actions) {
      if (a.type === "update") {
        const s = this.actorStates.get(a.target);
        if (s) Object.assign(s, a.props);
      } else if (a.type === "create") {
        this.actorStates.set(a.actor.id, { ...a.actor });
      } else if (a.type === "remove") {
        this.actorStates.delete(a.target);
      }
    }
  }

  goToStep(n) {
    n = Math.max(-1, Math.min(n, this.totalSteps - 1));
    this._init();
    for (let i = 0; i <= n; i++) this._apply(this.viz.steps[i].actions);
    this.currentStep = n;
    return this.getScene();
  }

  nextStep() { return this.currentStep < this.totalSteps - 1 ? this.goToStep(this.currentStep + 1) : null; }
  prevStep() { return this.currentStep >= 0 ? this.goToStep(this.currentStep - 1) : null; }

  getScene() {
    const changedIds = new Set();
    if (this.currentStep >= 0) {
      for (const a of this.viz.steps[this.currentStep].actions) {
        if (a.type === "update") changedIds.add(a.target);
        else if (a.type === "create") changedIds.add(a.actor.id);
      }
    }
    const curStep = this.currentStep >= 0 ? this.viz.steps[this.currentStep] : null;
    return {
      stepIndex: this.currentStep,
      description: curStep ? curStep.description : (this.viz.metadata.description || ""),
      narration: curStep?.narration || null,
      phase: curStep?.phase || null,
      annotation: curStep?.annotation || null,
      transition: curStep ? (curStep.transition || "smooth") : "instant",
      actors: new Map(this.actorStates),
      changedIds,
    };
  }

  get atEnd() { return this.currentStep >= this.totalSteps - 1; }
  get atStart() { return this.currentStep <= -1; }
}

    const ids = new Set(scene.actors.keys());
    for (const [id, el] of this.elements) {
      if (!ids.has(id)) { el.group.remove(); this.elements.delete(id); }
    }
    for (const [id, actor] of scene.actors) {
      if (this.elements.has(id)) this._update(id, actor, scene);
      else this._create(actor, scene);
    }
  }

  _create(a, scene) {
    const g = this._el("g", { class: "av-actor", "data-id": a.id });
    const entry = { group: g, type: a.type };
    this.elements.set(a.id, entry);
    const rc = this._rc;
    const uid = this._uid;

    switch (a.type) {
      case "cell": {
        const w = a.width || 60, h = a.height || 60;
        const fill = rc(a.fill, "$default");
        entry.rect = this._add(g, "rect", {
          x: a.x, y: a.y, width: w, height: h,
          rx: a.cornerRadius ?? 8, ry: a.cornerRadius ?? 8,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 1,
          filter: `url(#${uid}-shadow)`
        });
        entry.label = this._addText(g, a.x + w / 2, a.y + h / 2,
          a.label ?? String(a.value), {
            fill: rc(a.textColor, "$text"),
            "font-size": a.fontSize || 18,
            "font-weight": "700",
            "font-family": "'JetBrains Mono', monospace"
          });
        if (a.sublabel) {
          entry.sublabel = this._addText(g, a.x + w / 2, a.y + h + 18,
            a.sublabel, {
              fill: rc(null, "$muted"),
              "font-size": 11,
              "font-family": "'JetBrains Mono', monospace",
              opacity: 0.7
            });
        }
        break;
      }
      case "node": {
        const r = a.radius || 25;
        const fill = rc(a.fill, "$default");
        entry.circle = this._add(g, "circle", {
          cx: a.x, cy: a.y, r,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 2,
          opacity: a.opacity ?? 1,
          filter: `url(#${uid}-shadow)`
        });
        entry.label = this._addText(g, a.x, a.y,
          a.label ?? String(a.value), {
            fill: rc(a.textColor, "$text"),
            "font-size": a.fontSize || 15,
            "font-weight": "700"
          });
        if (a.sublabel) {
          entry.sublabel = this._addText(g, a.x, a.y + r + 20,
            a.sublabel, { fill: rc(null, "$muted"), "font-size": 12 });
        }
        break;
      }
      case "edge": {
        const { x1, y1, x2, y2 } = this._ec(a, scene);
        entry.line = this._add(g, "line", {
          x1, y1, x2, y2,
          stroke: rc(a.stroke, "$muted"),
          "stroke-width": a.strokeWidth ?? 2,
          "stroke-linecap": "round",
          "stroke-dasharray": a.dashArray || "",
          opacity: a.opacity ?? 0.6,
          "marker-end": a.directed ? `url(#${uid}-arrow)` : ""
        });
        g.style.color = rc(a.stroke, "$muted");
        const t = a.label || (a.weight != null ? String(a.weight) : "");
        if (t) {
          entry.midLabel = this._addText(g,
            (x1 + x2) / 2, (y1 + y2) / 2 - 12, t, {
              fill: rc(null, "$text"), "font-size": 12, "font-weight": "600",
              "font-family": "'JetBrains Mono', monospace"
            });
        }
        break;
      }
      case "pointer": {
        const { px, py, tx, ty } = this._pc(a, scene);
        entry.tri = this._add(g, "polygon", {
          points: this._tp(a.position, tx, ty),
          fill: rc(a.fill, "$primary")
        });
        entry.label = this._addText(g, px, py, a.label || "", {
          fill: rc(a.textColor, "$primary"),
          "font-size": a.fontSize || 13,
          "font-weight": "700",
          "font-family": "'JetBrains Mono', monospace"
        });
        g.setAttribute("opacity", a.opacity ?? 1);
        break;
      }
      case "label": {
        entry.text = this._addText(g, a.x, a.y, a.text, {
          "text-anchor": a.anchor || "start",
          fill: rc(a.fill, "$text"),
          "font-size": a.fontSize || 16,
          "font-weight": a.fontWeight || "normal",
          opacity: a.opacity ?? 1
        });
        break;
      }
      case "region": {
        entry.rect = this._add(g, "rect", {
          x: a.x, y: a.y, width: a.width, height: a.height,
          rx: a.cornerRadius ?? 10,
          fill: rc(a.fill, "$success"),
          stroke: rc(a.stroke, "$success"),
          "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 0.12,
          "stroke-dasharray": "4 2"
        });
        if (a.label) {
          entry.label = this._addText(g,
            a.x + a.width / 2, a.y + a.height / 2, a.label, {
              fill: rc(a.stroke, "$success"),
              "font-size": 13, "font-weight": "600", opacity: 0.7
            });
        }
        break;
      }
    }

    const layer = a.type === "edge" ? this.edgeLayer
      : a.type === "region" ? this.regionLayer
      : this.actorLayer;
    layer.appendChild(g);
  }

  _update(id, a, scene) {
    const e = this.elements.get(id);
    const rc = this._rc;
    const changed = scene.changedIds && scene.changedIds.has(id);
    const uid = this._uid;

    switch (a.type) {
      case "cell": {
        const w = a.width || 60, h = a.height || 60;
        const fill = rc(a.fill, "$default");
        const isActive = fill && fill !== rc(null, "$default") && fill !== rc(null, "$success");
        this._sa(e.rect, {
          x: a.x, y: a.y, width: w, height: h,
          rx: a.cornerRadius ?? 8, ry: a.cornerRadius ?? 8,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 1,
          filter: isActive && changed ? `url(#${uid}-glow)` : `url(#${uid}-shadow)`
        });
        if (changed && isActive) {
          e.group.style.transformOrigin = `${a.x + w/2}px ${a.y + h/2}px`;
          e.group.style.transform = "scale(1.08)";
          setTimeout(() => { if (e.group) e.group.style.transform = "scale(1)"; }, 400);
        }
        this._sa(e.label, {
          x: a.x + w / 2, y: a.y + h / 2,
          fill: rc(a.textColor, "$text"), "font-size": a.fontSize || 18
        });
        e.label.textContent = a.label ?? String(a.value);
        if (e.sublabel) {
          this._sa(e.sublabel, { x: a.x + w / 2, y: a.y + h + 18 });
          if (a.sublabel !== undefined) e.sublabel.textContent = a.sublabel;
        }
        break;
      }
      case "node": {
        const r = a.radius || 25;
        const fill = rc(a.fill, "$default");
        const isActive = fill && fill !== rc(null, "$default") && fill !== rc(null, "$success");
        this._sa(e.circle, {
          cx: a.x, cy: a.y, r,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 2,
          opacity: a.opacity ?? 1,
          filter: isActive && changed ? `url(#${uid}-glow)` : `url(#${uid}-shadow)`
        });
        if (changed && isActive) {
          e.group.style.transformOrigin = `${a.x}px ${a.y}px`;
          e.group.style.transform = "scale(1.15)";
          setTimeout(() => { if (e.group) e.group.style.transform = "scale(1)"; }, 400);
        }
        this._sa(e.label, {
          x: a.x, y: a.y,
          fill: rc(a.textColor, "$text"), "font-size": a.fontSize || 15
        });
        e.label.textContent = a.label ?? String(a.value);
        if (e.sublabel) {
          this._sa(e.sublabel, { x: a.x, y: a.y + r + 20 });
          if (a.sublabel !== undefined) e.sublabel.textContent = a.sublabel;
        }
        break;
      }
      case "edge": {
        const { x1, y1, x2, y2 } = this._ec(a, scene);
        const stroke = rc(a.stroke, "$muted");
        const sw = a.strokeWidth ?? 2;
        const isHighlighted = sw > 2;
        this._sa(e.line, {
          x1, y1, x2, y2,
          stroke: stroke,
          "stroke-width": sw,
          "stroke-linecap": "round",
          "stroke-dasharray": a.dashArray || "",
          opacity: isHighlighted ? 1 : (a.opacity ?? 0.6),
          "marker-end": a.directed ? `url(#${uid}-arrow)` : ""
        });
        e.group.style.color = stroke;
        if (e.midLabel) {
          this._sa(e.midLabel, {
            x: (x1 + x2) / 2, y: (y1 + y2) / 2 - 12,
            fill: rc(null, "$text")
          });
        }
        break;
      }
      case "pointer": {
        const { px, py, tx, ty } = this._pc(a, scene);
        this._sa(e.tri, { points: this._tp(a.position, tx, ty), fill: rc(a.fill, "$primary") });
        this._sa(e.label, {
          x: px, y: py,
          fill: rc(a.textColor, "$primary"), "font-size": a.fontSize || 13
        });
        e.label.textContent = a.label || "";
        e.group.setAttribute("opacity", a.opacity ?? 1);
        break;
      }
      case "label": {
        this._sa(e.text, {
          x: a.x, y: a.y, "text-anchor": a.anchor || "start",
          fill: rc(a.fill, "$text"),
          "font-size": a.fontSize || 16,
          "font-weight": a.fontWeight || "normal",
          opacity: a.opacity ?? 1
        });
        e.text.textContent = a.text;
        break;
      }
      case "region": {
        this._sa(e.rect, {
          x: a.x, y: a.y, width: a.width, height: a.height,
          rx: a.cornerRadius ?? 10,
          fill: rc(a.fill, "$success"),
          stroke: rc(a.stroke, "$success"),
          "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 0.12
        });
        if (e.label) {
          this._sa(e.label, {
            x: a.x + a.width / 2, y: a.y + a.height / 2,
            fill: rc(a.stroke, "$success")
          });
          if (a.label !== undefined) e.label.textContent = a.label;
        }
        break;
      }
    }
  }

  _ec(a, scene) {
    const src = scene.actors.get(a.source), tgt = scene.actors.get(a.target);
    if (!src || !tgt) return { x1: 0, y1: 0, x2: 0, y2: 0 };
    let x1, y1, x2, y2;
    if (src.type === "node") { x1 = src.x; y1 = src.y; }
    else { x1 = src.x + (src.width || 60) / 2; y1 = src.y + (src.height || 60) / 2; }
    if (tgt.type === "node") { x2 = tgt.x; y2 = tgt.y; }
    else { x2 = tgt.x + (tgt.width || 60) / 2; y2 = tgt.y + (tgt.height || 60) / 2; }
    if (a.directed && tgt.type === "node") {
      const r = tgt.radius || 25;
      const dx = x2 - x1, dy = y2 - y1, d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) { x2 -= (dx / d) * r; y2 -= (dy / d) * r; }
    }
    return { x1, y1, x2, y2 };
  }

  _pc(a, scene) {
    const t = scene.actors.get(a.target);
    if (!t) return { px: 0, py: 0, tx: 0, ty: 0 };
    let cx, cy, o;
    if (t.type === "node") { cx = t.x; cy = t.y; o = (t.radius || 25) + 12; }
    else if (t.type === "cell") { cx = t.x + (t.width || 60) / 2; cy = t.y + (t.height || 60) / 2; o = (t.height || 60) / 2 + 12; }
    else { cx = t.x || 0; cy = t.y || 0; o = 22; }
    const p = a.position; let px, py, tx, ty;
    if (p === "above") { tx = cx; ty = cy - o; px = cx; py = ty - 18; }
    else if (p === "below") { tx = cx; ty = cy + o; px = cx; py = ty + 18; }
    else if (p === "left") { tx = cx - o; ty = cy; px = tx - 18; py = cy; }
    else { tx = cx + o; ty = cy; px = tx + 18; py = cy; }
    return { px, py, tx, ty };
  }

  _tp(p, tx, ty) {
    const s = 6;
    if (p === "above") return `${tx},${ty+s} ${tx-s},${ty-s} ${tx+s},${ty-s}`;
    if (p === "below") return `${tx},${ty-s} ${tx-s},${ty+s} ${tx+s},${ty+s}`;
    if (p === "left") return `${tx+s},${ty} ${tx-s},${ty-s} ${tx-s},${ty+s}`;
    return `${tx-s},${ty} ${tx+s},${ty-s} ${tx+s},${ty+s}`;
  }

  get _rc() { return (v, f) => { const c = v ?? f; return this.engine.resolveColor(c); }; }

  _el(t, a) {
    const e = document.createElementNS(NS, t);
    if (a) this._sa(e, a);
    return e;
  }

  _sa(e, a) {
    for (const [k, v] of Object.entries(a)) {
      if (v === undefined || v === null) continue;
      e.setAttribute(k, String(v));
    }
  }

  _add(g, t, a) { const e = this._el(t, a); g.appendChild(e); return e; }

  _addText(g, x, y, text, extra) {
    const e = this._el("text", {
      x, y, "text-anchor": "middle", "dominant-baseline": "central",
      "font-family": "inherit", ...extra
    });
    e.textContent = text;
    g.appendChild(e);
    return e;
  }
}

// ---- Player UI ----

class Player {
  constructor(container, viz) {
    this.root = typeof container === "string" ? document.querySelector(container) : container;
    this.engine = new Engine(viz);
    this.renderer = null;
    this.playing = false;
    this.timer = null;
    this.speed = 1;
    this._keyHandler = null;
    this._build();
    this._bind();
  }

  _build() {
    this.root.innerHTML = "";
    const viz = this.engine.viz, meta = viz.metadata;

    // Header
    const header = this._div("av-header");
    const h1 = document.createElement("h1");
    h1.textContent = meta.title;
    header.appendChild(h1);
    const metaDiv = this._div("av-meta");
    if (meta.category) {
      const b = document.createElement("span");
      b.className = "av-badge av-badge-accent";
      b.textContent = meta.category;
      metaDiv.appendChild(b);
    }
    if (meta.complexity?.time) {
      const b = document.createElement("span");
      b.className = "av-badge";
      b.textContent = meta.complexity.time;
      metaDiv.appendChild(b);
    }
    if (meta.difficulty) {
      const b = document.createElement("span");
      b.className = "av-badge";
      b.textContent = meta.difficulty;
      metaDiv.appendChild(b);
    }
    header.appendChild(metaDiv);
    this.root.appendChild(header);

    // Canvas
    const main = this._div("av-main");
    const cw = this._div("av-canvas-wrap");
    main.appendChild(cw);
    this.root.appendChild(main);

    // Legend
    const legend = this._div("av-legend");
    const legendItems = [
      ["#e2e8f0", "Default"],
      ["#6c8cff", "Active"],
      ["#fbbf24", "Comparing"],
      ["#f87171", "Swapping"],
      ["#34d399", "Sorted/Done"]
    ];
    for (const [color, text] of legendItems) {
      const item = this._div("av-legend-item");
      const dot = document.createElement("span");
      dot.className = "av-legend-dot";
      dot.style.background = color;
      const lbl = document.createElement("span");
      lbl.textContent = text;
      item.appendChild(dot);
      item.appendChild(lbl);
      legend.appendChild(item);
    }
    this.root.appendChild(legend);

    // Description
    const desc = this._div("av-description");
    this.descStep = document.createElement("span");
    this.descStep.className = "av-description-step";
    this.annotationBadge = document.createElement("span");
    this.annotationBadge.className = "av-annotation-badge";
    this.annotationBadge.style.display = "none";
    this.phaseBadge = document.createElement("span");
    this.phaseBadge.className = "av-phase-badge";
    this.phaseBadge.style.display = "none";
    this.descText = document.createElement("span");
    this.descText.className = "av-description-text";
    desc.appendChild(this.descStep);
    desc.appendChild(this.annotationBadge);
    desc.appendChild(this.phaseBadge);
    desc.appendChild(this.descText);
    this.root.appendChild(desc);

    // Controls
    const ctrl = this._div("av-controls");
    this.btnPrev = this._btn("\u25C0", "av-btn", "Previous (\u2190)");
    this.btnPlay = this._btn("\u25B6", "av-btn av-btn-play", "Play/Pause (Space)");
    this.btnNext = this._btn("\u25B6", "av-btn", "Next (\u2192)");
    this.timeline = document.createElement("input");
    this.timeline.type = "range";
    this.timeline.className = "av-timeline";
    this.timeline.min = -1;
    this.timeline.max = this.engine.totalSteps - 1;
    this.timeline.value = -1;
    this.speedBtn = document.createElement("button");
    this.speedBtn.className = "av-speed";
    this.speedBtn.textContent = "1\u00d7";
    this.stepCount = document.createElement("span");
    this.stepCount.className = "av-step-count";

    [this.btnPrev, this.btnPlay, this.btnNext, this.timeline, this.speedBtn, this.stepCount]
      .forEach(e => ctrl.appendChild(e));
    this.root.appendChild(ctrl);

    // Shortcuts
    const shortcuts = this._div("pg-shortcuts");
    const shortcutData = [
      ["\u2190", "Prev"], ["\u2192", "Next"], ["Space", "Play/Pause"], ["Home", "Start"], ["End", "End"]
    ];
    for (const [key, label] of shortcutData) {
      const item = this._div("pg-shortcut");
      const k = document.createElement("span");
      k.className = "pg-key";
      k.textContent = key;
      const l = document.createElement("span");
      l.textContent = label;
      item.appendChild(k);
      item.appendChild(l);
      shortcuts.appendChild(item);
    }
    this.root.appendChild(shortcuts);

    // Init renderer
    this.renderer = new Renderer(cw, this.engine);
    this.renderer.init();
    this._updateUI();
  }

  _bind() {
    this.btnPlay.addEventListener("click", () => this.togglePlay());
    this.btnPrev.addEventListener("click", () => { this.pause(); this._step(-1); });
    this.btnNext.addEventListener("click", () => { this.pause(); this._step(1); });
    this.timeline.addEventListener("input", () => {
      this.pause();
      const s = this.engine.goToStep(parseInt(this.timeline.value));
      this.renderer.render(s);
      this._updateUI();
    });
    this.speedBtn.addEventListener("click", () => {
      const i = SPEEDS.indexOf(this.speed);
      this.speed = SPEEDS[(i + 1) % SPEEDS.length];
      this.speedBtn.textContent = this.speed + "\u00d7";
    });
    // Remove old key handler if any
    if (this._keyHandler) document.removeEventListener("keydown", this._keyHandler);
    this._keyHandler = (e) => {
      if (e.target.tagName === "TEXTAREA") return;
      if (e.target.tagName === "INPUT" && e.target.type !== "range") return;
      switch (e.key) {
        case " ": e.preventDefault(); this.togglePlay(); break;
        case "ArrowRight": e.preventDefault(); this.pause(); this._step(1); break;
        case "ArrowLeft": e.preventDefault(); this.pause(); this._step(-1); break;
        case "Home": e.preventDefault(); this.pause(); this.engine.goToStep(-1); this._render(); break;
        case "End": e.preventDefault(); this.pause(); this.engine.goToStep(this.engine.totalSteps - 1); this._render(); break;
      }
    };
    document.addEventListener("keydown", this._keyHandler);
  }

  destroy() {
    this.pause();
    if (this._keyHandler) document.removeEventListener("keydown", this._keyHandler);
    this.root.innerHTML = "";
  }

  togglePlay() { this.playing ? this.pause() : this.play(); }

  play() {
    if (this.engine.atEnd) { this.engine.goToStep(-1); this._render(); }
    this.playing = true;
    this.btnPlay.textContent = "\u23F8";
    this._tick();
  }

  pause() {
    this.playing = false;
    if (this.btnPlay) this.btnPlay.textContent = "\u25B6";
    clearTimeout(this.timer);
  }

  _tick() {
    if (!this.playing) return;
    const s = this.engine.nextStep();
    if (s) {
      this.renderer.render(s);
      this._updateUI();
      this.timer = setTimeout(() => this._tick(), this.engine.config.playback.stepDuration / this.speed);
    } else {
      this.pause();
    }
  }

  _step(d) {
    const s = d > 0 ? this.engine.nextStep() : this.engine.prevStep();
    if (s) { this.renderer.render(s); this._updateUI(); }
  }

  _render() { this.renderer.render(this.engine.getScene()); this._updateUI(); }

  _updateUI() {
    const s = this.engine.currentStep, t = this.engine.totalSteps;
    this.timeline.value = s;
    this.stepCount.textContent = `${s + 1} / ${t}`;
    const sc = this.engine.getScene();
    if (sc.narration) {
      this.descText.innerHTML = this._sanitize(sc.narration);
    } else {
      this.descText.textContent = sc.description;
    }
    this.descStep.textContent = s >= 0 ? `${s + 1}` : "";
    this.descStep.style.display = s >= 0 ? "" : "none";
    if (sc.annotation) {
      this.annotationBadge.textContent = sc.annotation;
      this.annotationBadge.dataset.type = sc.annotation;
      this.annotationBadge.style.display = "";
    } else { this.annotationBadge.style.display = "none"; }
    if (sc.phase) {
      this.phaseBadge.textContent = sc.phase;
      this.phaseBadge.style.display = "";
    } else { this.phaseBadge.style.display = "none"; }
  }

  _sanitize(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    tmp.querySelectorAll("script,style,iframe,object,embed,form,input,link").forEach(e => e.remove());
    tmp.querySelectorAll("*").forEach(el => {
      for (const attr of [...el.attributes]) {
        if (attr.name === "class" || attr.name === "style") continue;
        if (attr.name.startsWith("on")) el.removeAttribute(attr.name);
      }
    });
    return tmp.innerHTML;
  }
  _div(c) { const d = document.createElement("div"); d.className = c; return d; }
  _btn(t, c, title) {
    const b = document.createElement("button"); b.className = c;
    b.textContent = t; if (title) b.title = title; return b;
  }
}

// Expose globally
window.AlgoVizPlayer = Player;

})();
</script>

<script>
(function() {
  "use strict";

  let currentPlayer = null;
  let currentAlgoKey = null;

  // Build algorithm list
  const algoList = document.getElementById("algo-list");
  ALGO_META.forEach(({ key, icon, name }) => {
    const data = ALGORITHMS[key];
    const meta = data.metadata;
    const li = document.createElement("li");
    li.className = "pg-algo-item";
    li.dataset.key = key;
    li.innerHTML = `
      <span class="algo-icon">${icon}</span>
      <span class="algo-name">${name}</span>
      <span class="algo-diff ${meta.difficulty || ''}">${meta.difficulty || ''}</span>
    `;
    li.addEventListener("click", () => loadAlgorithm(key));
    algoList.appendChild(li);
  });

  function loadAlgorithm(key) {
    const data = ALGORITHMS[key];
    if (!data) return;

    // Update active state
    currentAlgoKey = key;
    document.querySelectorAll(".pg-algo-item").forEach(el => {
      el.classList.toggle("active", el.dataset.key === key);
    });

    // Update info panel
    updateInfoPanel(data);

    // Load player
    loadPlayer(data);
  }

  function updateInfoPanel(data) {
    const meta = data.metadata;
    const grid = document.getElementById("info-grid");
    let html = '';

    if (meta.category) {
      html += `<div class="pg-info-item">
        <div class="info-label">Category</div>
        <div class="info-value">${esc(meta.category)}</div>
      </div>`;
    }
    if (meta.difficulty) {
      html += `<div class="pg-info-item">
        <div class="info-label">Difficulty</div>
        <div class="info-value">${esc(meta.difficulty)}</div>
      </div>`;
    }
    if (meta.complexity?.time) {
      html += `<div class="pg-info-item">
        <div class="info-label">Time</div>
        <div class="info-value">${esc(meta.complexity.time)}</div>
      </div>`;
    }
    if (meta.complexity?.space) {
      html += `<div class="pg-info-item">
        <div class="info-label">Space</div>
        <div class="info-value">${esc(meta.complexity.space)}</div>
      </div>`;
    }
    if (meta.inputDescription) {
      html += `<div class="pg-info-item full">
        <div class="info-label">Input</div>
        <div class="info-value">${esc(meta.inputDescription)}</div>
      </div>`;
    }
    if (meta.description) {
      html += `<div class="pg-info-item full">
        <div class="info-label">Description</div>
        <div class="info-value desc">${esc(meta.description)}</div>
      </div>`;
    }
    if (meta.tags && meta.tags.length > 0) {
      html += `<div class="pg-info-item full">
        <div class="info-label">Tags</div>
        <div class="pg-tag-list">${meta.tags.map(t => `<span class="pg-tag">${esc(t)}</span>`).join('')}</div>
      </div>`;
    }

    grid.innerHTML = html;
  }

  function loadPlayer(data) {
    const root = document.getElementById("player-root");

    // Destroy previous player
    if (currentPlayer) {
      currentPlayer.destroy();
      currentPlayer = null;
    }

    try {
      currentPlayer = new window.AlgoVizPlayer(root, data);
    } catch (e) {
      root.innerHTML = `<div style="padding:40px;color:var(--danger);font-family:var(--mono);font-size:14px;">
        Error loading visualization:<br><br>${esc(e.message)}
      </div>`;
    }
  }

  // Custom JSON loading
  const loadJsonBtn = document.getElementById("load-json-btn");
  const jsonInput = document.getElementById("json-input");
  const jsonError = document.getElementById("json-error");

  loadJsonBtn.addEventListener("click", () => {
    jsonError.style.display = "none";
    const raw = jsonInput.value.trim();
    if (!raw) {
      showError("Please paste AlgoViz JSON data.");
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (!data.version) {
        showError('Missing required "version" field. Expected "1.0".');
        return;
      }
      if (!data.actors || !Array.isArray(data.actors)) {
        showError('Missing or invalid "actors" array.');
        return;
      }
      if (!data.steps || !Array.isArray(data.steps)) {
        showError('Missing or invalid "steps" array.');
        return;
      }
      if (!data.metadata) {
        data.metadata = { title: "Custom Visualization", algorithm: "custom" };
      }

      // Deselect built-in algorithms
      currentAlgoKey = null;
      document.querySelectorAll(".pg-algo-item").forEach(el => el.classList.remove("active"));

      updateInfoPanel(data);
      loadPlayer(data);
    } catch (e) {
      showError("Invalid JSON: " + e.message);
    }
  });

  function showError(msg) {
    jsonError.textContent = msg;
    jsonError.style.display = "block";
  }

  function esc(s) {
    if (!s) return '';
    const d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  // Auto-load first algorithm
  loadAlgorithm("bubble-sort");

})();
</script>

</body>
</html>
